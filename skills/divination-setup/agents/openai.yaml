interface:
  display_name: "Divination Setup"
  short_description: "Install OpenDivination and configure entropy sources"
  default_prompt: "Use the divination-setup skill when the user wants to install or update OpenDivination, bootstrap the portable skill bundle, run first-run setup, store ANU or Outshift credentials, or prepare QCicada and other hardware entropy sources. Keep `csprng` as the default unless the user explicitly chooses otherwise, prefer `qcicada` over the aggregate `openentropy` path when local quantum hardware is available, and verify the final setup with `opendivination version`, `sources --json`, and a JSON draw when helpful."
