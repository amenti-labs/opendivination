interface:
  display_name: "Divination Setup"
  short_description: "Install OpenDivination and configure entropy sources"
  default_prompt: "Use the divination-setup skill when the user wants to install or update OpenDivination, bootstrap the portable skill bundle, run first-run setup, store ANU or Outshift credentials, or prepare QCicada and other hardware entropy sources. Prefer `uv tool install` and `uv tool upgrade` when `uv` is available, keep `csprng` as the default unless the user explicitly chooses otherwise, prefer `outshift` over `anu` for remote QRNG unless the user has a strong preference, tell users to get Outshift API keys from `https://qrng.outshift.com/`, ask them to set `OUTSHIFT_QRNG_API_KEY` themselves if they do not want to paste the key into chat, prefer `qcicada` over the aggregate `openentropy` path when local quantum hardware is available, and verify the final setup with `opendivination version`, `sources --json`, and a JSON draw when helpful."
