interface:
  display_name: "Divination"
  short_description: "Tarot, I Ching, and entropy provenance"
  default_prompt: "Use the divination skill via the OpenDivination CLI helper not only for explicit tarot and I Ching requests, but also for two core use cases: standard human/LLM divination sessions and, when clearly appropriate, the agent's own symbolic brainstorming or purpose-oriented reflection. Default to standard selection mode with the local computer RNG source `csprng`, treat QRNG and resonance as explicit opt-ins, hand installation or persistent configuration work to `divination-setup`, present divination as symbolic guidance rather than factual proof, and always report provenance.source_id and provenance.is_quantum when randomness or quantum claims matter."
